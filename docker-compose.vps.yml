# Modulo: infraestrutura
# Arquivo: docker-compose.vps.yml
# Funcao no sistema: subir frontend (Nginx) + backend (Node.js) na VPS com rede do host.
# Observacao: host networking garante conectividade IPv6 do backend com Supabase quando o DNS do Postgres for apenas AAAA.

services:
  backend:
    container_name: cjm_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cjm-patrimonio-backend:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      # Persistencia de fotos fora do ciclo de vida do container.
      - /opt/cjm-patrimonio/shared/data/fotos:/app/data/fotos
      # Backups locais (db/media) persistidos no host.
      - /opt/cjm-patrimonio/backups:/app/data/backups
      # Configuracao do rclone (token OAuth do Drive).
      - /root/.config/rclone:/root/.config/rclone
    environment:
      NODE_ENV: "production"
      HOST: "127.0.0.1"
      PORT: "3001"
      DB_SSL: "${DB_SSL:-require}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-*}"
      DATABASE_URL: "${DATABASE_URL}"
      # Modulo: backend/auth
      # Funcao: repassar AUTH_* do .env para habilitar login via JWT (quando ativado).
      AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-}"
      AUTH_JWT_EXPIRES_IN: "${AUTH_JWT_EXPIRES_IN:-12h}"
      # Modulo: backend/drive
      # Funcao: upload de fotos via n8n webhook + persistencia do link no banco.
      N8N_DRIVE_PHOTOS_WEBHOOK_URL: "${N8N_DRIVE_PHOTOS_WEBHOOK_URL:-}"
      DRIVE_PHOTOS_FOLDER_ID: "${DRIVE_PHOTOS_FOLDER_ID:-}"
      # Modulo: backup/drive
      # Funcao: parametros operacionais do backup visual por botoes (admin).
      BACKUP_REMOTE_BASE: "${BACKUP_REMOTE_BASE:-cjm_gdrive:db-backups}"
      BACKUP_KEEP_DAYS_DEFAULT: "${BACKUP_KEEP_DAYS_DEFAULT:-14}"
      BACKUP_MEDIA_SOURCE: "${BACKUP_MEDIA_SOURCE:-/app/data/fotos}"
      # Metadados de versao para /health e painel Auditoria/Logs.
      APP_GIT_COMMIT: "${APP_GIT_COMMIT:-}"
      APP_GIT_BRANCH: "${APP_GIT_BRANCH:-}"

  frontend:
    container_name: cjm_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    image: cjm-patrimonio-frontend:latest
    restart: unless-stopped
    network_mode: host
